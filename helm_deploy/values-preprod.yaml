---
# Per environment values which override defaults in hmpps-x-ray-body-scans-ui/values.yaml

generic-service:
  replicaCount: 2

  ingress:
    host: x-ray-body-scans-ui-preprod.hmpps.service.justice.gov.uk

  env:
    ENVIRONMENT: preprod             # k8s namespace suffix & github environment
    ENVIRONMENT_NAME: PRE-PRODUCTION # Phase banner tag label
    SENTRY_ENVIRONMENT: preprod
    INGRESS_URL: "https://x-ray-body-scans-ui-preprod.hmpps.service.justice.gov.uk"
    HMPPS_AUTH_URL: "https://sign-in-preprod.hmpps.service.justice.gov.uk/auth"
    TOKEN_VERIFICATION_API_URL: "https://token-verification-api-preprod.prison.service.justice.gov.uk"
    AUDIT_ENABLED: "false"

generic-prometheus-alerts:
  alertSeverity: hmpps-connect-dps-non-prod
